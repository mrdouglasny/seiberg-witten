# formalization.yaml (v0.3) — https://github.com/mathlib-initiative/formalization.yaml
# seiberg-witten — the Seiberg–Witten solution of N=2 SU(2) SYM from named postulates H0–H7

version: "v0.3"

project:
  name: "Seiberg–Witten solution of N=2 SU(N) super Yang–Mills"
  authors:
    - "Michael R. Douglas"
    # Code is AI-authored; see automation.
  license: "Apache-2.0"

sources:
  - title: "Electric-magnetic duality, monopole condensation, … (SW1)"
    authors: ["N. Seiberg", "E. Witten"]
    id: "Nucl. Phys. B426 (1994) 19; hep-th/9407087"
    type: "paper"
  - title: "Monopoles, duality and chiral symmetry breaking in N=2 supersymmetric QCD (SW2)"
    authors: ["N. Seiberg", "E. Witten"]
    id: "Nucl. Phys. B431 (1994) 484; hep-th/9408099"
    type: "paper"
  - title: "Simple singularities and N=2 supersymmetric Yang-Mills theory (KLYT)"
    authors: ["A. Klemm", "W. Lerche", "S. Yankielowicz", "S. Theisen"]
    id: "Phys. Lett. B344 (1995) 169; hep-th/9411048"
    type: "paper"
  - title: "Vacuum structure and spectrum of N=2 SUSY gauge theory (Argyres–Faraggi)"
    authors: ["P. C. Argyres", "A. E. Faraggi"]
    id: "Phys. Rev. Lett. 74 (1995) 3931; hep-th/9411057"
    type: "paper"
  - title: "Introduction to Seiberg-Witten theory and its stringy origin (Lerche)"
    authors: ["W. Lerche"]
    id: "hep-th/9611190"
    type: "review"
  - title: "jacobian-challenge (Riemann-surface / period / Jacobian machinery)"
    authors: ["Michael R. Douglas"]
    id: "https://github.com/mrdouglasny/jacobian-challenge"
    type: "formalization"
    # Used ONLY by the unbuilt higher-genus layer (HigherGenus/, outside the
    # certified build). The main library is self-contained on pinned Mathlib.

status:
  scope: >
    Codify the physical inputs of the Seiberg–Witten solution as named postulates
    H0–H7 — predicates and structures carried in theorem types, never axioms — and
    machine-check that the solution follows. At rank 1 (SU(2)) the chain is complete:
    H-level cusp data ⟹ the developing formula λ(τ(u)) = 2Λ²/(u+Λ²) including its
    normalization ⟹ uniqueness up to Γ(2), plus the explicit elliptic coupling, the
    exact singularity count (n = 1 monopole–dyon pair, with the K3 loophole n ≡ 1
    mod 6 witnessed), and SU(2) SQCD (coupling rigidity; the Argyres–Douglas locus
    nonempty, axiom-free). The higher-rank SU(N) headline is a proved skeleton modulo
    the consolidated period-geometry axiom periodRigidityAxiom (discharge = future
    work). Companion paper: docs/paper1.tex. Self-contained on pinned Mathlib;
    the higher-genus Riemann-surface layer (HigherGenus/) is kept outside the build.
  sorry_count: 0
  sorry_in_definitions: 0
  axioms:
    - propext
    - Classical.choice
    - Quot.sound
    # The project's named classical-mathematics axioms (citable, numerically vetted;
    # full table with ratings and discharge routes in AXIOM_AUDIT.md). There is NO
    # physics axiom: H0–H7 are hypotheses in theorem types.
    - AX_thrice_punctured_uniformization   # Γ(2) covering (modular λ uniformizes ℂ∖{0,1})
    - AX_developing_map_rigidity           # lift uniqueness over that covering
    - AX_elliptic_inversion                # Jacobi inversion / θ-bridge (WW §§21–22)
    - AX_jacobi_quartic                    # θ₃⁴ = θ₂⁴ + θ₄⁴ (CAS-verified to order 200)
    - AX_theta3_ne_zero                    # θ₃ ≠ 0 on ℍ (CAS-checked)
    - periodRigidityAxiom                  # higher-rank Gauss–Manin period geometry (future work)
    # Off every headline footprint (declared, consumed by no tracked theorem):
    - localMonodromy
    - AX_picard_lefschetz_local
  main_results:
    - declaration: "SeibergWitten.Physics.SU2.sw_su2_unique"
      file: "SeibergWitten/Physics/SU2Rigidity.lean"
      sorry_count: 0
      axioms: [propext, Classical.choice, Quot.sound, AX_thrice_punctured_uniformization, AX_developing_map_rigidity]
      literature_dependencies:
        - statement: "The SU(2) solution is unique up to Γ(2) EM duality (H0–H7 in the hypotheses)."
          source: "SW1 hep-th/9407087 §3–4"
    - declaration: "SeibergWitten.Physics.SU2.swModulusData_of_atlas_and_lifts / sw_su2_unique_coulomb"
      file: "SeibergWitten/Physics/CuspData.lean"
      sorry_count: 0
      axioms: [propext, Classical.choice, Quot.sound, AX_jacobi_quartic, AX_theta3_ne_zero]
      numeric: "pass@mpmath (audit/numerical/validate_cuspdata.py, 19/19, dps=40)"
      literature_dependencies:
        - statement: >
            The qualitative cusp data (three cusp limits, two omitted values) follows from
            an H4-style duality-glued atlas plus parabolic cusp lifts with non-extension
            (H2/H3, H6-qualitative); uniqueness then holds on the Coulomb branch directly.
          source: "SW1 hep-th/9407087 §3–4"
    - declaration: "SeibergWitten.Physics.SU2.swModulusData_eq_crossRatio"
      file: "SeibergWitten/Physics/DevelopingBase.lean"
      sorry_count: 0
      axioms: [propext, Classical.choice, Quot.sound]
      numeric: "pass@mpmath (audit/numerical/validate_devbase.py, 13/13, dps=40)"
      literature_dependencies:
        - statement: >
            The developing formula λ(τ(u)) = 2Λ²/(u+Λ²) — including its normalization —
            is forced by the qualitative cusp data (removability + polynomial-growth
            Liouville); the monodromy postulate is a theorem, not an assumption.
          source: "SW1 hep-th/9407087 §4 (the 'very strong' monodromy input, derived)"
    - declaration: "SeibergWitten.Physics.SU2.su2_coupling_exists / su2_coupling_canonical"
      file: "SeibergWitten/Physics/SU2Rigidity.lean"
      sorry_count: 0
      axioms: [propext, Classical.choice, Quot.sound, AX_elliptic_inversion, AX_thrice_punctured_uniformization, AX_developing_map_rigidity]
      numeric: "pass@mpmath (audit/numerical/validate_elliptic.py 92/92; validate_taulayer.py 21/21; validate_specialcoords.py 14/14)"
      literature_dependencies:
        - statement: >
            The explicit SU(2) coupling exists (elliptic construction; special coordinates,
            da_D/da = τ, one-loop running u·τ′ → i/π) and is unique up to Γ(2);
            existence needs Jacobi inversion only.
          source: "SW1 hep-th/9407087 §4; WW §§21–22"
    - declaration: "SeibergWitten.Physics.SingularityCount.singularity_count_pinch"
      file: "SeibergWitten/Physics/SingularityCount.lean"
      sorry_count: 0
      axioms: [propext, Classical.choice, Quot.sound]
      numeric: "pass@mpmath (audit/numerical/validate_singcount.py, 33/33)"
      literature_dependencies:
        - statement: >
            Exactly one monopole–dyon pair: the Euler/mod-12 counting alone allows
            n ≡ 1 (mod 6) (the K3 loophole is witnessed); H7's curve-level shadow
            (R-spurion covariance ⟹ anomaly grading) pinches n = 1.
          source: "SW1 hep-th/9407087 §3; Kodaira fiber tables (cited, transcribed)"
    - declaration: "SeibergWitten.Physics.matter_coupling_rigidity"
      file: "SeibergWitten/Physics/MatterInvariants.lean"
      sorry_count: 0
      axioms: [propext, Classical.choice, Quot.sound, AX_jacobi_quartic, AX_theta3_ne_zero, AX_thrice_punctured_uniformization, AX_developing_map_rigidity]
      numeric: "pass@mpmath (audit/numerical/validate_matterj.py, 26/26)"
      literature_dependencies:
        - statement: >
            SU(2) SQCD (1 ≤ N_f ≤ 3): two j-developing couplings agree on the chart up
            to Γ(2) × an anharmonic word — no matter-specific axiom.
          source: "SW2 hep-th/9408099"
    - declaration: "SeibergWitten.Physics.matter_argyresDouglasLocus_nonempty / matterPeriodRigidity_nf1_ad"
      file: "SeibergWitten/Physics/MatterChart.lean"
      sorry_count: 0
      axioms: [propext, Classical.choice, Quot.sound]
      literature_dependencies:
        - statement: >
            The Argyres–Douglas locus (mutually non-local massless states) is nonempty
            at N_f = 1: an explicit period chart at the AD point, exact discriminant
            factorization; DISCLOSED non-SQCD witness (the predicate's under-specification
            made formal). matterPeriodRigidityAxiom is discharged.
          source: "Argyres–Douglas hep-th/9505062; SW2 hep-th/9408099"
    - declaration: "SeibergWitten.Physics.SU2.su2_singular_locus"
      file: "SeibergWitten/Physics/SU2Singularities.lean"
      sorry_count: 0
      axioms: [propext, Classical.choice, Quot.sound]
      numeric: "pass@numpy (audit/numerical/validate_lambda.py)"
      literature_dependencies:
        - statement: "The SU(2) curve is singular exactly at u = ±Λ² (monopole/dyon, no others)."
          source: "SW1 hep-th/9407087 §3–4; Bilal hep-th/9601007"
    - declaration: "SeibergWitten.Physics.sw_effective_theory_unique_up_to_duality / sw_curve_admits_effective_theory"
      file: "SeibergWitten/Physics/PeriodLayer.lean"
      sorry_count: 0
      axioms: [propext, Classical.choice, Quot.sound, periodRigidityAxiom]
      literature_dependencies:
        - statement: >
            Higher rank (SU(N), N ≥ 2): the curve realizes an effective theory satisfying
            H0–H6, unique up to Sp(2(N−1),ℤ) — proved skeleton modulo the consolidated
            period-geometry axiom (the declared future work).
          source: "KLYT hep-th/9411048; Argyres–Faraggi hep-th/9411057"

# The physics enters ONLY through the hypotheses H0–H7 (one-line table in README.md;
# definitions in SeibergWitten/Physics/Hypotheses.lean; physical case in the paper §4.2
# and Appendix A) and their stated curve/Kodaira transcriptions, validated per
# audit/FIDELITY_REVIEW.md. Higher-genus results (genus N−1, Im τ ≻ 0 via Riemann
# bilinear) live in HigherGenus/ (unbuilt; inherits jacobian-challenge's
# AX_PeriodCycleBasis there).

automation:
  methods:
    - method: "agent"
      models: ["claude-opus-4-8", "claude-fable-5"]
      framework: "Claude Code (Anthropic CLI)"
      prompting_notes: >
        Plan-driven campaigns with adversarial statement review before adoption
        (gate: reviews by Codex/GPT-5 and Gemini), a golden #print axioms
        certificate regenerated on every push, and an independent numerical oracle
        tier. Faithfulness digests quote the Lean verbatim and are machine-diffed
        against the source (audit/check_faithfulness.py).
  notes: "No human-written Lean; all proofs AI-authored under human steering."

fidelity:
  divergences: >
    Physics-first project: the trusted informal↔formal boundary is the H0–H7
    transcriptions and the curve/Kodaira dictionary (Dictionary.lean, paper §4.1).
    Known disclosed items: the matter-chart witness is non-SQCD (the existence
    predicate is under-specified — recorded, not hidden); the beta-function
    statement is existential (see AXIOM_AUDIT.md caveat). Per-claim verdicts:
    audit/FIDELITY_REVIEW.md; per-entry verbatim quotes: audit/FAITHFULNESS.md
    (machine-checked); claim-by-claim map: audit/CORRESPONDENCE_INDEX.md.
  numeric_validation: >
    Nine independent mpmath/numpy oracle suites, 278 checks at dps 30–40
    (audit/numerical/validate_{lambda,elliptic,swcrossratio,specialcoords,taulayer,
    matterj,singcount,devbase,cuspdata}.py): the θ/λ layer and axioms, elliptic
    integrals and Jacobi inversion, the pinned modulus, special coordinates against
    honest ∮λ_SW quadrature, the τ-derivative layer, the matter j-invariant layer,
    the singularity-count pinch, the developing-base derivation, and the cusp-data
    monodromies (the trace check that caught the B7 dyon slip). Oracle catches are
    recorded in audit/DIFFICULT_POINTS.md.

review:
  status: "agent-reviewed"
  notes: >
    All tracked declarations #print-axioms-verified against the golden certificate
    (bash audit/gen_axiom_report.sh --check). Adversarial statement reviews by
    Codex/GPT-5 and Gemini at each campaign gate (records: AXIOM_AUDIT.md and
    audit/DIFFICULT_POINTS.md; the 2026-07-04 external claim review scoped the
    headline wording). No human-mathematician review yet. Reviewer entry point:
    audit/REVIEWER.md.

alignment:
  namespace: "SeibergWitten"
  statements:
    - source: "SW1 §3–4: uniqueness of the solution up to EM duality"
      lean: "SeibergWitten.Physics.SU2.sw_su2_unique / sw_su2_unique_coulomb"
      module: "SeibergWitten/Physics/SU2Rigidity.lean"
      status: "proved"
      note: "standard-3 + the Γ(2) covering/lift pair only; H0–H7 as hypotheses"
    - source: "SW1 §4: the developing formula and its normalization"
      lean: "SeibergWitten.Physics.SU2.swModulusData_eq_crossRatio"
      module: "SeibergWitten/Physics/DevelopingBase.lean"
      status: "proved"
      note: "axiom-free; the 'very strong' monodromy postulate demoted to a theorem"
    - source: "SW1 §4: the explicit coupling (elliptic construction)"
      lean: "SeibergWitten.Physics.SU2.su2_coupling_exists / su2_coupling_canonical"
      module: "SeibergWitten/Physics/SU2Rigidity.lean"
      status: "proved"
      note: "existence on AX_elliptic_inversion alone; canonicity + covering pair"
    - source: "SW1 §3: exactly one monopole–dyon pair"
      lean: "SeibergWitten.Physics.SingularityCount.singularity_count_pinch"
      module: "SeibergWitten/Physics/SingularityCount.lean"
      status: "proved"
      note: "axiom-free; K3 loophole (n ≡ 1 mod 6) witnessed; H7 pinches n = 1"
    - source: "SW2: matter coupling rigidity; Argyres–Douglas point"
      lean: "SeibergWitten.Physics.matter_coupling_rigidity / matter_argyresDouglasLocus_nonempty"
      module: "SeibergWitten/Physics/MatterInvariants.lean, MatterChart.lean"
      status: "proved"
      note: "AD locus nonempty axiom-free (disclosed non-SQCD witness)"
    - source: "KLYT/AF: the higher-rank headline"
      lean: "SeibergWitten.Physics.sw_effective_theory_unique_up_to_duality"
      module: "SeibergWitten/Physics/PeriodLayer.lean"
      status: "proved modulo periodRigidityAxiom"
      note: "the declared future work (audit/PERIOD_LAYER_DISCHARGE.md)"
    - source: "KLYT/AF: SW curve genus N−1; Riemann positivity Im τ ≻ 0"
      lean: "genus_swCurve / sw_metric_posDef / sw_coupling_mem_siegel*"
      module: "HigherGenus/ (outside the certified build)"
      status: "proved (unbuilt layer; inherits AX_PeriodCycleBasis from jacobian-challenge)"
      note: "re-enable recipe in HigherGenus/README.md"
